
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Critical inline CSS for above-the-fold content -->
    <style>
      /* Critical styles for initial render */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background-color: #000;
        color: #fff;
        line-height: 1.5;
      }
      #root { min-height: 100vh; }
      /* Prevent flash of unstyled content */
      .page-container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
    </style>
    
    <!-- Meta tags will be set dynamically by react-helmet-async -->
    <meta name="author" content="Cosmedocs" />

    <!-- Open Graph and Twitter Card meta tags will be set dynamically by react-helmet-async -->

    
    <link rel="icon" href="/favicon.png" type="image/png" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts asynchronously with display=swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
    </noscript>

    <!-- Google Analytics - Deferred for performance -->
    <script>
      // Defer Google Analytics until page is interactive
      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-M1TYCHPT0Q';
          document.head.appendChild(script);
          
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-M1TYCHPT0Q');
        }, 1000);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
